<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告警配置管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>告警配置管理</h1>
        </header>
        
        <div class="alert-switches">
            <div class="switch-item">
                <label for="global-alert-switch">全局告警开关</label>
                <input type="checkbox" id="global-alert-switch">
            </div>
        </div>
        
        <div class="config-section">
            <h2>告警配置列表</h2>
            <button id="add-config-btn" class="btn btn-primary">添加告警配置</button>
            
            <table class="config-table">
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>类型</th>
                        <th>启用状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="config-list">
                    <!-- 配置项将通过JavaScript动态生成 -->
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- 添加/编辑配置模态框 -->
    <div id="config-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modal-title">添加告警配置</h3>
            <form id="config-form">
                <input type="hidden" id="config-id">
                
                <div class="form-group">
                    <label for="config-name">名称</label>
                    <input type="text" id="config-name" required>
                </div>
                
                <div class="form-group">
                    <label for="config-type">类型</label>
                    <select id="config-type" required>
                        <option value="email">邮件告警</option>
                        <option value="wechat">微信告警</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="config-enabled">启用</label>
                    <input type="checkbox" id="config-enabled" checked>
                </div>
                
                <div class="form-group">
                    <label for="config-settings">配置（JSON格式）</label>
                    <textarea id="config-settings" rows="10" required></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="button" id="cancel-btn" class="btn btn-secondary">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
